version: '3.8'

services:
  api:
    build: .
    container_name: healthrisk-api
    ports:
      - "8000:8000"
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  frontend:
    build: .
    container_name: healthrisk-frontend
    ports:
      - "8501:8501"
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    depends_on:
      - api
